version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: financial_forecasting_postgres
    environment:
      POSTGRES_DB: financial_forecasting
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: financial_forecasting_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DEBUG: 'True'
      SECRET_KEY: dev-secret-key-change-in-production
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: financial_forecasting
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8501,http://127.0.0.1:8501
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  streamlit:
    build: ./frontend
    container_name: financial_forecasting_frontend
    environment:
      API_URL: http://backend:8000/api
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

volumes:
  postgres_data:

networks:
  default:
    name: financial_forecasting_network

